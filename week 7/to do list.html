<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productivity Planner</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI, sans-serif;
margin:0;
background:linear-gradient(135deg,#89f7fe,#66a6ff);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

.dark{
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
}

h1{margin:20px}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:7px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
width:95%;
max-width:1100px;
background:white;
padding:20px;
border-radius:14px;
margin:15px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.day{
background:#f9f9ff;
border-radius:10px;
padding:10px;
display:flex;
flex-direction:column;
min-height:200px;
}

.tasks{flex-grow:1}

.task{
padding:6px;
border-radius:6px;
margin:4px 0;
font-size:12px;
}

.todo{background:#ffd6e0}
.progress{background:#fff0b3}
.done{background:#d6ffd9;text-decoration:line-through}

.inputbar{
display:flex;
flex-direction:column;
gap:4px;
}

input,select{
padding:5px;
border-radius:6px;
border:1px solid #ddd;
}

.section{margin-top:20px}

.goal{
background:#e6f2ff;
padding:6px;
border-radius:6px;
margin:5px 0;
}

.project{
background:#ffe9d6;
padding:6px;
border-radius:6px;
margin:4px 0;
}

/* SMALL PRODUCTIVITY CHART */
.chartBox{
max-width:380px;
margin:auto;
}

canvas{
max-height:220px;
}

</style>
</head>

<body>

<h1>🚀 Productivity Planner</h1>

<div class="topbar">
<button onclick="setView('day')">Day</button>
<button onclick="setView('week')">Week</button>
<button onclick="setView('month')">Month</button>
<button onclick="setView('year')">Year</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="container">
<div class="grid" id="planner"></div>
</div>

<div class="container section chartBox">
<h3>📊 Productivity Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="container section">
<h3>🎯 Goals</h3>

<input id="goalInput" placeholder="New goal">
<button onclick="addGoal()">Add Goal</button>

<div id="goals"></div>

</div>

<div class="container section">
<h3>📁 Projects</h3>

<input id="projectInput" placeholder="Project name">
<button onclick="addProject()">Add Project</button>

<div id="projects"></div>

</div>

<div class="container section">
<h3>🧠 Habit Tracker</h3>

<label><input type="checkbox" onchange="saveHabit('exercise',this.checked)"> Exercise</label><br>
<label><input type="checkbox" onchange="saveHabit('study',this.checked)"> Study</label><br>
<label><input type="checkbox" onchange="saveHabit('reading',this.checked)"> Reading</label>

</div>

<script>

let view="week"
let tasks=JSON.parse(localStorage.getItem("tasks"))||{}
let goals=JSON.parse(localStorage.getItem("goals"))||[]
let projects=JSON.parse(localStorage.getItem("projects"))||[]
let habits=JSON.parse(localStorage.getItem("habits"))||{}

const planner=document.getElementById("planner")

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
updateChart()
}

function setView(v){
view=v
render()
}

function getCount(){
if(view==="day") return 1
if(view==="week") return 7
if(view==="month") return 30
if(view==="year") return 12
}

function render(){

planner.innerHTML=""

let count=getCount()

for(let i=0;i<count;i++){

let key=view+"-"+i

let day=document.createElement("div")
day.className="day"

day.innerHTML=`
<h4>${view==="year"?"Month":"Day"} ${i+1}</h4>

<div class="tasks"></div>

<div class="inputbar">
<input placeholder="Task name">
<select>
<option value="todo">Todo</option>
<option value="progress">In Progress</option>
<option value="done">Done</option>
</select>

<input type="date">

<button>Add Task</button>
</div>
`

planner.appendChild(day)

let tasksDiv=day.querySelector(".tasks")
let input=day.querySelector("input")
let select=day.querySelector("select")
let date=day.querySelectorAll("input")[1]
let btn=day.querySelector("button")

if(tasks[key]){
tasks[key].forEach(t=>{
tasksDiv.appendChild(createTask(t.text,t.status,t.deadline,key))
})
}

btn.onclick=()=>{

let text=input.value.trim()
if(!text)return

let status=select.value
let deadline=date.value

if(!tasks[key])tasks[key]=[]

tasks[key].push({text,status,deadline})

tasksDiv.appendChild(createTask(text,status,deadline,key))

scheduleReminder(text,deadline)

input.value=""
save()
}

}

}

function createTask(text,status,deadline,key){

let div=document.createElement("div")
div.className="task "+status
div.innerHTML=text+(deadline?` <small>(${deadline})</small>`:"")

div.onclick=()=>{

let states=["todo","progress","done"]
let i=states.indexOf(status)
status=states[(i+1)%3]

div.className="task "+status

tasks[key].forEach(t=>{
if(t.text===text)t.status=status
})

save()
}

return div

}

function scheduleReminder(text,date){

if(!("Notification" in window)) return

Notification.requestPermission()

let target=new Date(date).getTime()
let delay=target-Date.now()

if(delay>0){

setTimeout(()=>{
new Notification("Task Reminder",{body:text})
},delay)

}

}

function updateChart(){

let todo=0,progress=0,done=0

Object.values(tasks).forEach(list=>{
list.forEach(t=>{
if(t.status==="todo")todo++
if(t.status==="progress")progress++
if(t.status==="done")done++
})
})

chart.data.datasets[0].data=[todo,progress,done]
chart.update()

}

const chart=new Chart(document.getElementById("chart"),{
type:"pie",
data:{
labels:["Todo","Progress","Done"],
datasets:[{
data:[0,0,0],
backgroundColor:["#ffd6e0","#fff0b3","#d6ffd9"]
}]
}
})

function toggleDark(){
document.body.classList.toggle("dark")
}

function addGoal(){

let input=document.getElementById("goalInput")
let text=input.value.trim()
if(!text)return

goals.push(text)
localStorage.setItem("goals",JSON.stringify(goals))

renderGoals()
input.value=""
}

function renderGoals(){

let box=document.getElementById("goals")
box.innerHTML=""

goals.forEach(g=>{
let div=document.createElement("div")
div.className="goal"
div.textContent=g
box.appendChild(div)
})

}

function addProject(){

let input=document.getElementById("projectInput")
let text=input.value.trim()
if(!text)return

projects.push(text)
localStorage.setItem("projects",JSON.stringify(projects))

renderProjects()
input.value=""
}

function renderProjects(){

let box=document.getElementById("projects")
box.innerHTML=""

projects.forEach(p=>{
let div=document.createElement("div")
div.className="project"
div.textContent=p
box.appendChild(div)
})

}

function saveHabit(name,val){

habits[name]=val
localStorage.setItem("habits",JSON.stringify(habits))

}

render()
renderGoals()
renderProjects()
updateChart()

</script>

</body>
</html>
