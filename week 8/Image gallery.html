<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Photography Gallery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

body {
  font-family: 'Poppins', sans-serif;
  background: #f4f4f9;
  margin: 0;
  padding: 0;
  color: #333;
}

h1 {
  text-align: center;
  margin: 40px 0 10px;
  font-size: 2.5rem;
  font-weight: 600;
  color: #222;
}

h2 {
  margin: 30px 0 15px;
  font-size: 1.8rem;
  font-weight: 600;
  text-align: center;
  color: #444;
  position: relative;
}

h2::after {
  content: '';
  display: block;
  width: 80px;
  height: 3px;
  background: #4dabf7;
  margin: 10px auto 0;
  border-radius: 2px;
}

.collection {
  max-width: 1200px;
  margin: 0 auto 50px;
  padding: 0 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.gallery img:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

/* Lightbox purely CSS (hover enlarge with overlay) */
.gallery a {
  display: block;
  position: relative;
}

.gallery a::after {
  content: '🔍';
  position: absolute;
  font-size: 2rem;
  color: rgba(255,255,255,0.9);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.3s;
}

.gallery a:hover::after {
  opacity: 1;
}

@media (max-width: 480px) {
  h1 { font-size: 2rem; }
  h2 { font-size: 1.5rem; }
  .gallery img { height: 160px; }
}
</style>
</head>
<body>

<h1>📸 Professional Photography Gallery</h1>

<!-- Collection 1: Nature -->
<div class="collection">
<h2>🌿 Nature Collection</h2>
<div class="gallery">
  <a href="#"><img src="https://picsum.photos/id/1011/600/400" alt="Nature 1"></a>
  <a href="#"><img src="https://picsum.photos/id/1012/600/400" alt="Nature 2"></a>
  <a href="#"><img src="https://picsum.photos/id/1013/600/400" alt="Nature 3"></a>
</div>
</div>

<!-- Collection 2: Architecture -->
<div class="collection">
<h2>🏛 Architecture Collection</h2>
<div class="gallery">
  <a href="#"><img src="https://picsum.photos/id/1025/600/400" alt="Architecture 1"></a>
  <a href="#"><img src="https://picsum.photos/id/1026/600/400" alt="Architecture 2"></a>
  <a href="#"><img src="https://picsum.photos/id/1027/600/400" alt="Architecture 3"></a>
</div>
</div>

<!-- Collection 3: Portraits -->
<div class="collection">
<h2>👤 Portrait Collection</h2>
<div class="gallery">
  <a href="#"><img src="https://picsum.photos/id/1005/600/400" alt="Portrait 1"></a>
  <a href="#"><img src="https://picsum.photos/id/1006/600/400" alt="Portrait 2"></a>
  <a href="#"><img src="https://picsum.photos/id/1008/600/400" alt="Portrait 3"></a>
</div>
</div>

</body>
</html>
